<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>离线代币转移系统</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background: #f5f5f5;
            color: #333;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 1.8em;
            color: #222;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin: 16px 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .card-title {
            font-size: 1.1em;
            font-weight: 600;
            margin-bottom: 15px;
            color: #222;
        }

        label {
            display: block;
            font-size: 0.9em;
            margin-top: 12px;
            margin-bottom: 6px;
            font-weight: 500;
            color: #555;
        }

        input, textarea {
            font-size: 16px;
            padding: 12px;
            margin-bottom: 10px;
            width: 100%;
            box-sizing: border-box;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: inherit;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 0 3px rgba(0,123,255,0.1);
        }

        button {
            font-size: 16px;
            padding: 12px 16px;
            margin-top: 10px;
            margin-bottom: 10px;
            width: 100%;
            box-sizing: border-box;
            border: none;
            border-radius: 8px;
            background: #007bff;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #0056b3;
        }

        button:active {
            opacity: 0.9;
        }

        button.secondary {
            background: #6c757d;
            margin-right: 8px;
            flex: 1;
        }

        button.secondary:hover {
            background: #545b62;
        }

        button.success {
            background: #28a745;
        }

        button.success:hover {
            background: #218838;
        }

        button.danger {
            background: #dc3545;
        }

        button.danger:hover {
            background: #c82333;
        }

        .button-group {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .button-group button {
            flex: 1;
            margin: 0;
        }

        .balance-display {
            font-size: 2.5em;
            font-weight: bold;
            color: #28a745;
            text-align: center;
            margin: 15px 0;
            padding: 15px;
            background: #f0f8f5;
            border-radius: 8px;
        }

        .key-display {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 6px;
            font-size: 0.75em;
            word-break: break-all;
            margin: 8px 0;
            max-height: 100px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            border: 1px solid #e9ecef;
            color: #495057;
        }

        .alert {
            padding: 12px;
            border-radius: 6px;
            margin-top: 10px;
            font-size: 0.95em;
            display: none;
        }

        .alert.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .alert.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .alert.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }

        .hidden {
            display: none;
        }

        .section-divider {
            height: 1px;
            background: #e9ecef;
            margin: 20px 0;
        }

        .mining-status {
            text-align: center;
            padding: 10px;
            font-size: 0.9em;
            color: #666;
        }

        .mining-active {
            color: #28a745;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <h1>💰 离线代币转移系统</h1>

    <!-- 身份面板 -->
    <div class="card" id="identityCard">
        <div class="card-title">👤 我的身份</div>
        <div id="identityContent">
            <button onclick="generateIdentity()">生成新身份</button>
        </div>
        <div id="identityInfo" class="hidden">
            <label>公钥 (收款地址)</label>
            <div class="key-display" id="publicKeyDisplay"></div>
            
            <div class="balance-display" id="balanceDisplay">0</div>
            
            <div class="mining-status" id="miningStatus">
                <span class="mining-active">⛏️ 自动挖矿中...</span>
            </div>

            <div class="button-group">
                <button class="secondary" onclick="resetIdentity()">重置身份</button>
                <button class="success" onclick="withdraw()">提现 (15932447705)</button>
            </div>
        </div>
    </div>

    <!-- 转账面板 -->
    <div class="card">
        <div class="card-title">📤 转账 (发送)</div>
        <label>接收方公钥</label>
        <textarea id="receiverPubKey" placeholder="粘贴对方的公钥..."></textarea>
        
        <label>转账金额</label>
        <input type="number" id="amount" value="1" min="1">
        
        <button class="success" onclick="generateTransfer()">生成转账凭证</button>
        
        <div id="transferResult" class="hidden">
            <label>转账凭证 (复制给接收方)</label>
            <textarea id="transferVoucher" readonly></textarea>
            <button class="secondary" onclick="copyVoucher()">📋 复制凭证</button>
        </div>
        <div id="transferError" class="alert error"></div>
    </div>

    <!-- 接收面板 -->
    <div class="card">
        <div class="card-title">📥 接收代币</div>
        <label>粘贴凭证</label>
        <textarea id="voucherInput" placeholder="在此粘贴收到的凭证..."></textarea>
        
        <button class="success" onclick="verifyAndReceive()">验证并接收</button>
        
        <div id="receiveResult" class="alert success"></div>
        <div id="receiveError" class="alert error"></div>
    </div>

    <div style="text-align: center; padding: 20px; color: #999; font-size: 0.85em;">
        ✓ 完全离线 · 浏览器本地存储 · 无任何网络依赖
    </div>

    <script>
        // ============ 存储键定义 ============
        const STORAGE_KEYS = {
            PUBLIC_KEY: 'btc_off_pub',
            PRIVATE_KEY: 'btc_off_priv',
            BALANCE: 'btc_off_bal',
            USED_NONCES: 'btc_off_nonces'
        };

        // ============ 工具函数 ============
        function saveData(key, value) {
            localStorage.setItem(key, JSON.stringify(value));
        }

        function loadData(key) {
            const raw = localStorage.getItem(key);
            return raw ? JSON.parse(raw) : null;
        }

        function arrayBufferToBase64(buffer) {
            const bytes = new Uint8Array(buffer);
            let binary = '';
            bytes.forEach(b => binary += String.fromCharCode(b));
            return btoa(binary);
        }

        function base64ToArrayBuffer(base64) {
            const binary = atob(base64);
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) {
                bytes[i] = binary.charCodeAt(i);
            }
            return bytes.buffer;
        }

        // ============ 密钥导入导出 ============
        async function importPublicKey(base64Key) {
            const keyBuffer = base64ToArrayBuffer(base64Key);
            return await crypto.subtle.importKey(
                'spki',
                keyBuffer,
                { name: 'ECDSA', namedCurve: 'P-256' },
                true,
                ['verify']
            );
        }

        async function importPrivateKey(base64Key) {
            const keyBuffer = base64ToArrayBuffer(base64Key);
            return await crypto.subtle.importKey(
                'pkcs8',
                keyBuffer,
                { name: 'ECDSA', namedCurve: 'P-256' },
                true,
                ['sign']
            );
        }

        async function exportPublicKey(key) {
            const exported = await crypto.subtle.exportKey('spki', key);
            return arrayBufferToBase64(exported);
        }

        async function exportPrivateKey(key) {
            const exported = await crypto.subtle.exportKey('pkcs8', key);
            return arrayBufferToBase64(exported);
        }

        // ============ 身份管理 ============
        async function generateIdentity() {
            try {
                const keyPair = await crypto.subtle.generateKey(
                    { name: 'ECDSA', namedCurve: 'P-256' },
                    true,
                    ['sign', 'verify']
                );
                const pub = await exportPublicKey(keyPair.publicKey);
                const priv = await exportPrivateKey(keyPair.privateKey);
                
                saveData(STORAGE_KEYS.PUBLIC_KEY, pub);
                saveData(STORAGE_KEYS.PRIVATE_KEY, priv);
                saveData(STORAGE_KEYS.BALANCE, 0);
                saveData(STORAGE_KEYS.USED_NONCES, []);
                
                displayIdentity();
                startAutoMining();
            } catch (e) {
                alert('生成失败: ' + e.message);
            }
        }

        function resetIdentity() {
            if (confirm('确定重置吗？所有数据将被清除。')) {
                localStorage.clear();
                stopAutoMining();
                displayIdentity();
            }
        }

        function displayIdentity() {
            const pubKey = loadData(STORAGE_KEYS.PUBLIC_KEY);
            const identityContent = document.getElementById('identityContent');
            const identityInfo = document.getElementById('identityInfo');
            
            if (pubKey) {
                identityContent.classList.add('hidden');
                identityInfo.classList.remove('hidden');
                document.getElementById('publicKeyDisplay').textContent = pubKey;
                document.getElementById('balanceDisplay').textContent = getBalance();
            } else {
                identityContent.classList.remove('hidden');
                identityInfo.classList.add('hidden');
            }
        }

        // ============ 余额管理 ============
        function getBalance() {
            return loadData(STORAGE_KEYS.BALANCE) || 0;
        }

        function setBalance(val) {
            saveData(STORAGE_KEYS.BALANCE, val);
            document.getElementById('balanceDisplay').textContent = val;
        }

        // ============ 自动挖矿 ============
        let autoMiningInterval = null;

        function startAutoMining() {
            if (!loadData(STORAGE_KEYS.PUBLIC_KEY)) return;
            if (autoMiningInterval) clearInterval(autoMiningInterval);
            
            autoMiningInterval = setInterval(() => {
                setBalance(getBalance() + 1);
            }, 2000);
        }

        function stopAutoMining() {
            if (autoMiningInterval) {
                clearInterval(autoMiningInterval);
                autoMiningInterval = null;
            }
        }

        // ============ 转账功能 ============
        async function generateTransfer() {
            const receiver = document.getElementById('receiverPubKey').value.trim();
            const amount = parseInt(document.getElementById('amount').value);
            const myPub = loadData(STORAGE_KEYS.PUBLIC_KEY);
            const myPriv = loadData(STORAGE_KEYS.PRIVATE_KEY);

            const errorEl = document.getElementById('transferError');
            errorEl.style.display = 'none';

            if (!myPub) {
                errorEl.textContent = '请先生成身份';
                errorEl.style.display = 'block';
                return;
            }

            if (!receiver) {
                errorEl.textContent = '请输入接收方公钥';
                errorEl.style.display = 'block';
                return;
            }

            if (isNaN(amount) || amount <= 0) {
                errorEl.textContent = '请输入有效的转账金额';
                errorEl.style.display = 'block';
                return;
            }

            if (amount > getBalance()) {
                errorEl.textContent = '余额不足';
                errorEl.style.display = 'block';
                return;
            }

            try {
                const payload = {
                    receiver: receiver,
                    amount: amount,
                    nonce: crypto.randomUUID(),
                    ts: Date.now()
                };

                const payloadStr = JSON.stringify(payload);
                const privKey = await importPrivateKey(myPriv);
                
                const sig = await crypto.subtle.sign(
                    { name: 'ECDSA', hash: 'SHA-256' },
                    privKey,
                    new TextEncoder().encode(payloadStr)
                );

                const voucher = btoa(JSON.stringify({
                    payload: payload,
                    sig: arrayBufferToBase64(sig),
                    sender: myPub
                }));

                setBalance(getBalance() - amount);
                document.getElementById('transferVoucher').value = voucher;
                document.getElementById('transferResult').classList.remove('hidden');
                errorEl.style.display = 'none';
            } catch (e) {
                errorEl.textContent = '生成失败: ' + e.message;
                errorEl.style.display = 'block';
            }
        }

        function copyVoucher() {
            const el = document.getElementById('transferVoucher');
            el.select();
            document.execCommand('copy');
            alert('已复制到剪贴板');
        }

        // ============ 接收功能 ============
        async function verifyAndReceive() {
            const input = document.getElementById('voucherInput').value.trim();
            const resultEl = document.getElementById('receiveResult');
            const errorEl = document.getElementById('receiveError');
            
            resultEl.style.display = 'none';
            errorEl.style.display = 'none';

            if (!input) {
                errorEl.textContent = '请粘贴凭证';
                errorEl.style.display = 'block';
                return;
            }

            try {
                const data = JSON.parse(atob(input));
                const { payload, sig, sender } = data;
                const myPub = loadData(STORAGE_KEYS.PUBLIC_KEY);

                if (!myPub) {
                    errorEl.textContent = '请先生成身份';
                    errorEl.style.display = 'block';
                    return;
                }

                // 检查接收方是否匹配
                if (payload.receiver !== myPub) {
                    errorEl.textContent = '接收方不匹配，这不是发给您的凭证';
                    errorEl.style.display = 'block';
                    return;
                }

                // 检查 nonce 是否已使用
                const nonces = loadData(STORAGE_KEYS.USED_NONCES) || [];
                if (nonces.includes(payload.nonce)) {
                    errorEl.textContent = '凭证已被使用，防止双花';
                    errorEl.style.display = 'block';
                    return;
                }

                // 验证签名
                const senderKey = await importPublicKey(sender);
                const payloadStr = JSON.stringify(payload);
                const isValid = await crypto.subtle.verify(
                    { name: 'ECDSA', hash: 'SHA-256' },
                    senderKey,
                    base64ToArrayBuffer(sig),
                    new TextEncoder().encode(payloadStr)
                );

                if (!isValid) {
                    errorEl.textContent = '签名验证失败，凭证可能被篡改';
                    errorEl.style.display = 'block';
                    return;
                }

                // 全部验证通过，接收代币
                nonces.push(payload.nonce);
                saveData(STORAGE_KEYS.USED_NONCES, nonces);
                setBalance(getBalance() + payload.amount);

                resultEl.textContent = `✓ 接收成功！获得 ${payload.amount} 个代币`;
                resultEl.style.display = 'block';
                document.getElementById('voucherInput').value = '';
            } catch (e) {
                errorEl.textContent = '凭证格式错误或验证失败: ' + e.message;
                errorEl.style.display = 'block';
            }
        }

        // ============ 提现功能 ============
        function withdraw() {
            alert('提现申请已记录，请联系：15932447705');
        }

        // ============ 页面初始化 ============
        window.addEventListener('load', () => {
            displayIdentity();
            if (loadData(STORAGE_KEYS.PUBLIC_KEY)) {
                startAutoMining();
            }
        });

        window.addEventListener('beforeunload', stopAutoMining);
    </script>
</body>
</html>
